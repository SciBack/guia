events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver — permite startup aunque upstreams no estén listos
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api {
        server api:8000;
    }
    upstream chainlit {
        server chainlit:8001;
    }
    upstream dashboard {
        server dashboard:8501;
    }
    upstream keycloak {
        server keycloak:8080;
    }

    # Logging en JSON para parseo estructurado
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"upstream":"$upstream_addr",'
        '"request_time":$request_time'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    server {
        # Puerto 80: estándar HTTP — flujo principal.
        listen 80;
        # Puerto 8001: el LB institucional UPeU (pr-lb-intranet1, 192.168.12.199)
        # apunta a guia.upeu.edu.pe → VM:8001 desde su config histórica
        # (cuando chainlit se exponía directo). Al cerrar ese puerto en el
        # commit 02f73a4 (fix WebSocket), se rompió el flujo del LB → 502.
        # Solución: nginx escucha también en 8001 con la MISMA config (incluye
        # proxy WebSocket correcto), así el LB sigue funcionando sin tocar
        # su configuración. Cuando redes UPeU actualice el LB a :80, este
        # listen se puede eliminar.
        listen 8001;
        server_name _;

        # GUIA REST API
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health endpoint
        location /health {
            proxy_pass http://api/health;
        }

        # Chainlit chat web
        location /chat/ {
            proxy_pass http://chainlit/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Streamlit dashboard
        location /dashboard/ {
            proxy_pass http://dashboard/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Keycloak SSO
        location /auth/ {
            proxy_pass http://keycloak/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Chainlit settings — nunca cachear (React SPA lo carga una vez)
        location /project/settings {
            proxy_pass http://chainlit;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # Default — Chainlit
        location / {
            proxy_pass http://chainlit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
