# Suite gold-standard de regresión P1.2 (50 queries representativas)
#
# Cada query declara la decisión esperada de la cascada (intent + privacy + tier).
# El test test_router_regression valida:
#   1) que cada decisión sea correcta
#   2) que ≥70% se resuelva en Gate 1 o Gate 2 (sin LLM clasificador)
#
# Categorías cubiertas:
#   - greeting (10): saludos, cortesía, meta-preguntas → Gate 1
#   - command (3): /help, /reset → Gate 1
#   - campus_personal (10): mis notas, mi deuda, etc → Gate 1 (ALWAYS_LOCAL)
#   - campus_generico (8): calendario, eventos públicos → Gate 2
#   - research_simple (10): catálogo, "¿hay X?" → Gate 2
#   - research_deep (9): síntesis, comparativas, marcos → Gate 2

